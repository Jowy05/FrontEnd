<div class="login-container">
  <h2>Acceso ROL USER</h2>
  
  @if(mensajeError) {
    <div class="alert-error">
      {{ mensajeError }}
    </div>
  }

  <form (ngSubmit)="onLogin()">
    <div class="form-group">
      <label>Email</label>
      <input type="text" name="email" [(ngModel)]="loginData.email" required>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" name="password" [(ngModel)]="loginData.password" required>
    </div>

    <button type="submit">Entrar</button>
  </form>

  <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
</div>
