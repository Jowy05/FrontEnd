<div class="perfil-container">
  <h2>Tu Hoja de Personaje</h2>

  @if(mensaje) {
    <div class="alert">{{ mensaje }}</div>
  }

  <form (ngSubmit)="guardarCambios()">
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" name="name" [(ngModel)]="userProfile.name" required>
    </div>

    <div class="form-group">
      <label>Email (No editable)</label>
      <input type="email" name="email" [(ngModel)]="userProfile.email" disabled>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Edad</label>
        <input type="number" name="age" [(ngModel)]="userProfile.age" required>
      </div>

      <div class="form-group">
        <label>Sexo</label>
        <select name="sex" [(ngModel)]="userProfile.sex" required>
          <option value="M">Masculino</option>
          <option value="F">Femenino</option>
          <option value="O">Otro</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Nivel de Juego</label>
      <select name="level" [(ngModel)]="userProfile.level" required>
        <option value="BASIC">Básico</option>
        <option value="MEDIUM">Medio</option>
        <option value="HIGH">Alto</option>
      </select>
    </div>

    <button type="submit">Actualizar Estadísticas</button>
  </form>
</div>
